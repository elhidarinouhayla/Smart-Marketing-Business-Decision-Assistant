name: Smart Marketing CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration de Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip' # Accélère les prochaines exécutions

    - name: Installation de Java (Requis pour PySpark)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11' # Version stable recommandée pour Spark

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # On s'assure que les outils de test sont présents
        pip install pytest pytest-mock

    - name: Exécution des tests avec Pytest
      env:
        # On définit les variables d'environnement nécessaires
        DATABASE_URL: "sqlite:///./test.db" 
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PYTHONPATH: .
      run: |
        # On lance les tests dans le dossier /tests
        pytest tests/ -v