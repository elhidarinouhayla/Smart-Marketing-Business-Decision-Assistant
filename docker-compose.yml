services:

  # base de donnees postgreSQL unique
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  
  # airflow initialisation
  airflow-init:
    build: .
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/airflow
    volumes:
      - ./init_airflow.sh:/init_airflow.sh
    entrypoint: ["/bin/bash", "/init_airflow.sh"]

  # airflow principal
   
  airflow:
    build: .
    container_name: airflow
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/airflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
    volumes:
      - .:/app
      - ./airflow_home/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - ./airflow_home/plugins:/opt/airflow/plugins
      - ./requirements.txt:/requirements.txt
      - ./ml/data:/opt/airflow/ml/data
    command: >
      bash -c "
        airflow scheduler &
        airflow webserver
      "
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"

  
  # backend fastAPI
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: backend
    restart: always
    environment:
      - HOST=postgres
      - DATABASE=airflow
      - USER=postgres
      - PASSWORD=postgres
      - PORT=5432
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8001:8000"
    command: uvicorn backend.app.api.api_auth:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy

  # MLflow Tracking Server
  mlflow:
    build: .
    container_name: mlflow
    restart: always
    ports:
      - "5001:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow_data:/app/mlflow_data
    working_dir: /app
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow_data/mlflow.db --default-artifact-root /app/mlruns

  # MLflow 
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: mlflow
    ports:
      - "5000:5000"
    command: mlflow ui --host 0.0.0.0
    volumes:
      - ./mlflow_data:/mlflow
    working_dir: /mlflow

volumes:
  postgres-data:
    driver: local
  airflow-logs:
    driver: local